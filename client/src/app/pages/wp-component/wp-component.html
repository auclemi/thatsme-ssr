@if (error()) {
  <app-error [errorMessage]="error()"></app-error>
}

@if (!error() && loading()) {
  <app-loader />
}

@if (!loading() && !error() && page()) {
  <h1 [innerHTML]="page()?.title?.rendered"></h1>
  <div [innerHTML]="page()?.content?.rendered"></div>
}

@if (!loading() && !page() && !error()) {
  <p>Contenu indisponible hors connexion.</p>
}
