<h1>Statistiques</h1>

<div *ngIf="loading">Chargement…</div>
<div *ngIf="error">Erreur lors du chargement des stats.</div>

<table *ngIf="!loading && !error">
  <thead>
    <tr>
      <th>Date</th>
      <th>Page</th>
      <th>Visiteur</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let s of stats">
      <td>{{ formatDate(s.ts) }}</td>
      <td>{{ s.path }}</td>
      <td>{{ s.uid }}</td>
    </tr>
  </tbody>
</table>
